<!DOCTYPE html><html lang="en" data-theme="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>NovaChat</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--p:#7c5cfc;--bg:#0a0a12;--bg2:#12121e;--s:rgba(255,255,255,0.05);--sh:rgba(255,255,255,0.08);--t:#e8e8f0;--ts:#8880a0;--tm:#55556a;--b:rgba(255,255,255,0.06);--r:14px;--rs:10px;--danger:#ff4d6a;--success:#2ecc71}
[data-theme="light"]{--bg:#f0f0f5;--bg2:#fff;--s:rgba(0,0,0,0.03);--sh:rgba(0,0,0,0.06);--t:#1a1a2e;--ts:#555;--tm:#999;--b:rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--tm);border-radius:4px}

/* Auth */
.auth{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;background:radial-gradient(ellipse at top left,rgba(124,92,252,0.1),transparent 60%)}
.auth-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--b);border-radius:18px;padding:32px 24px}
.auth-card h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.auth-card h1 span{background:linear-gradient(135deg,#7c5cfc,#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-card .sub{text-align:center;color:var(--ts);font-size:13px;margin-bottom:18px}
.auth-error{color:var(--danger);font-size:13px;display:none;margin-bottom:10px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--ts);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border-radius:var(--rs);border:1px solid var(--b);background:var(--s);color:var(--t);font-size:14px;outline:none;font-family:inherit}
.form-group input:focus{border-color:var(--p)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%;font-family:inherit}
.btn-pri{background:linear-gradient(135deg,#7c5cfc,#6a4de6);color:#fff}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,92,252,0.3)}
.btn-sec{background:var(--s);color:var(--ts);border:1px solid var(--b)}
.btn-sec:hover{background:var(--sh);color:var(--t)}
.btn-sm{padding:6px 12px;font-size:12px;width:auto}
.btn-icon{width:32px;height:32px;border-radius:50%;padding:0;display:inline-flex;align-items:center;justify-content:center}
.link{color:var(--p);cursor:pointer;font-weight:600}
.switch-text{text-align:center;font-size:13px;color:var(--ts);margin-top:14px}

/* App */
.app{display:none;height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;z-index:100;transition:left .3s}
.sidebar-header{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:16px;font-weight:700}
.sidebar-header h2 span{color:var(--p)}
.sidebar-header .actions{display:flex;gap:4px}
.sidebar-header .actions button{width:30px;height:30px;border-radius:50%;border:none;background:var(--s);color:var(--ts);cursor:pointer;font-size:13px}
.sidebar-header .actions button:hover{background:var(--sh);color:var(--t)}
.search-box{padding:8px 12px;position:relative}
.search-box input{width:100%;padding:7px 12px 7px 32px;border-radius:var(--rs);border:1px solid var(--b);background:var(--s);color:var(--t);font-size:13px;outline:none}
.search-box i{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--tm);font-size:12px}
.tabs{display:flex;border-bottom:1px solid var(--b)}
.tab{flex:1;padding:7px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--tm);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--t)}
.tab.active{color:var(--p);border-bottom-color:var(--p)}
.chat-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.chat-item:hover{background:var(--sh)}
.chat-item.active{background:var(--s);border-left-color:var(--p)}
.c-av{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--p),#2ecc71);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;position:relative;overflow:hidden}
.c-av img{width:100%;height:100%;object-fit:cover}
.online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2);background:var(--success);display:none}
.online-dot.show{display:block}
.c-info{flex:1;min-width:0}
.c-name{font-size:14px;font-weight:600}
.c-name .v{font-size:11px;margin-left:2px;color:var(--p)}
.c-name .prem{color:#f1c40f;font-size:11px}
.c-last{font-size:12px;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

/* Main */
.main{margin-left:280px;height:100vh;display:flex;flex-direction:column}
.chat-top{padding:8px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.chat-top .c-av{width:34px;height:34px;font-size:14px}
.chat-top .info{flex:1;min-width:0}
.chat-top .name{font-size:14px;font-weight:600}
.chat-top .name .v{font-size:11px;color:var(--p);margin-left:2px}
.chat-top .status{font-size:11px;color:var(--ts)}
.chat-top .actions{display:flex;gap:4px}
.chat-top .actions button{width:30px;height:30px;border-radius:50%;border:none;background:var(--s);color:var(--ts);cursor:pointer;font-size:12px}
.chat-top .actions button:hover{background:var(--sh);color:var(--t)}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.msg{max-width:80%;padding:7px 12px;border-radius:12px;font-size:14px;line-height:1.4;animation:in .15s}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.sent{align-self:flex-end;background:var(--p);color:#fff;border-bottom-right-radius:4px}
.msg.recv{align-self:flex-start;background:var(--s);border:1px solid var(--b);border-bottom-left-radius:4px}
.msg .sender{font-size:11px;font-weight:600;color:var(--p);margin-bottom:2px}
.msg .txt{word-break:break-word}
.msg .txt img,.msg .txt video{max-width:200px;border-radius:6px;display:block;margin:4px 0}
.msg .txt audio{max-width:200px}
.msg .time{font-size:10px;opacity:.5;margin-top:3px;text-align:right}
.msg .reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.msg .reactions span{background:var(--sh);padding:2px 6px;border-radius:8px;font-size:13px;cursor:pointer}
.edited{font-size:10px;opacity:.4;font-style:italic}
.typing{font-size:11px;color:var(--tm);padding:2px 16px 4px;font-style:italic;min-height:18px}
.input-area{padding:8px 12px;border-top:1px solid var(--b);display:flex;align-items:center;gap:6px}
.input-area input{flex:1;padding:8px 14px;border-radius:20px;border:1px solid var(--b);background:var(--s);color:var(--t);font-size:14px;outline:none;font-family:inherit}
.input-area input:focus{border-color:var(--p)}
.input-area button.send{width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--p),#6a4de6);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.input-area button.send:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(124,92,252,0.3)}
.input-area button.at{background:none;border:none;color:var(--tm);font-size:16px;cursor:pointer;padding:4px}
.input-area button.at:hover{color:var(--t)}
.empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--tm)}
.empty i{font-size:48px;opacity:.2}
.empty h3{font-size:17px;color:var(--ts)}
.empty p{font-size:13px}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--b);border-radius:16px;padding:24px;max-width:420px;width:100%;max-height:75vh;overflow-y:auto}
.modal-box h2{font-size:17px;margin-bottom:12px}
.modal-box .close{float:right;background:none;border:none;color:var(--tm);font-size:20px;cursor:pointer}
.modal-box .close:hover{color:var(--t)}
.modal-box .stat-box{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.modal-box .stat-box > div{background:var(--s);padding:8px 12px;border-radius:8px;flex:1;text-align:center;min-width:60px}
.modal-box .stat-box .num{font-size:16px;font-weight:700;color:var(--p)}
.modal-box .stat-box .lbl{font-size:11px;color:var(--tm)}

.toast{position:fixed;bottom:20px;right:20px;z-index:3000;background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:10px 16px;font-size:13px;display:none;animation:up .3s}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){.sidebar{left:-280px}.sidebar.open{left:0;width:100%}.main{margin-left:0}}
</style>
</head><body>

<div class="auth" id="authWrap">
  <div class="auth-card" id="loginCard">
    <h1>Nova<span>Chat</span></h1><p class="sub">Sign in</p>
    <div class="auth-error" id="loginErr"></div>
    <form id="loginForm">
      <div class="form-group"><label>Username</label><input type="text" id="loginU" required placeholder="username"></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginP" required placeholder="••••"></div>
      <button class="btn btn-pri" type="submit">Sign In</button>
    </form>
    <p class="switch-text">No account? <span class="link" onclick="sR()">Create one</span></p>
  </div>
  <div class="auth-card" id="regCard" style="display:none">
    <h1>Nova<span>Chat</span></h1><p class="sub">Create account</p>
    <div class="auth-error" id="regErr"></div>
    <form id="regForm">
      <div class="form-group"><label>Username</label><input type="text" id="regU" required minlength="3"></div>
      <div class="form-group"><label>Password</label><input type="password" id="regP" required minlength="6"></div>
      <button class="btn btn-pri" type="submit">Create</button>
    </form>
    <p class="switch-text">Have an account? <span class="link" onclick="sL()">Sign in</span></p>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Nova<span>Chat</span></h2>
      <div class="actions">
        <button onclick="tTheme()" title="Theme"><i class="fas fa-moon"></i></button>
        <button onclick="openAdmin()" id="adminBtn" style="display:none" title="Admin"><i class="fas fa-shield-halved"></i></button>
        <button onclick="logout()" title="Logout"><i class="fas fa-right-from-bracket"></i></button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="sTab('users')">💬 Chats</div>
      <div class="tab" onclick="sTab('groups')">👥 Groups</div>
    </div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="search" placeholder="Search..." oninput="searchU(this.value)"></div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="main">
    <div class="chat-top" id="chatTop" style="display:none">
      <button class="btn-sec btn-icon" onclick="tSide()" id="hamburger" style="display:none"><i class="fas fa-bars"></i></button>
      <div class="c-av" id="chAv">N</div>
      <div class="info"><div class="name" id="chName">User</div><div class="status" id="chStatus"></div></div>
      <div class="actions">
        <button onclick="openProf()" title="Profile"><i class="fas fa-user"></i></button>
        <button onclick="callUser()" id="callBtn" style="display:none" title="Call"><i class="fas fa-phone"></i></button>
      </div>
    </div>

    <div class="empty" id="empty"><i class="fas fa-comments"></i><h3>Welcome</h3><p>Find someone to chat with</p></div>
    <div class="msgs" id="msgs" style="display:none"></div>
    <div class="typing" id="typing"></div>

    <div class="input-area" id="inputArea" style="display:none">
      <button class="at" onclick="document.getElementById('fInput').click()"><i class="fas fa-paperclip"></i></button>
      <input type="text" id="msgIn" placeholder="Message..." onkeydown="if(event.key==='Enter')send()">
      <button class="send" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<input type="file" id="fInput" style="display:none" multiple onchange="upFile(this)">

<div class="modal" id="profileModal"><div class="modal-box"><button class="close" onclick="cMod('profileModal')">✕</button>
  <h2>Profile</h2>
  <div class="form-group"><label>Display Name</label><input type="text" id="pName"></div>
  <div class="form-group"><label>Bio</label><textarea id="pBio" rows="2"></textarea></div>
  <div class="form-group"><label>Avatar</label><input type="file" id="pAv" accept="image/*" onchange="upAv(this)"></div>
  <button class="btn btn-pri" onclick="saveProf()">Save</button>
  <hr style="margin:12px 0;border-color:var(--b)">
  <p style="font-size:13px;color:var(--ts)">Verified: <span id="pVer">No</span> | Premium: <span id="pPrem">No</span></p>
</div></div>

<div class="modal" id="adminModal"><div class="modal-box"><button class="close" onclick="cMod('adminModal')">✕</button>
  <h2>🔐 Admin</h2>
  <div class="stat-box">
    <div><div class="num" id="aUsers">0</div><div class="lbl">Users</div></div>
    <div><div class="num" id="aMsgs">0</div><div class="lbl">Messages</div></div>
    <div><div class="num" id="aPrem">0</div><div class="lbl">Premium</div></div>
  </div>
  <div class="form-group"><label>Search</label><input type="text" id="aSearch" placeholder="Username..." oninput="aFind()"></div>
  <div id="aList"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
let token=localStorage.getItem('nc_t'),me=null,socket=null,cc=null,online=new Set,users=[],curTab='users';
if(token){try{me=JSON.parse(atob(token.split('.')[1]));if(Date.now()>me.exp*1000){localStorage.removeItem('nc_t');token=null;me=null}}catch(e){localStorage.removeItem('nc_t');token=null}}
function sR(){document.getElementById('loginCard').style.display='none';document.getElementById('regCard').style.display='block'}
function sL(){document.getElementById('regCard').style.display='none';document.getElementById('loginCard').style.display='block'}
function aErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',3000)}

document.getElementById('loginForm').addEventListener('submit',async e=>{e.preventDefault();const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('loginU').value.trim(),password:document.getElementById('loginP').value})});const d=await r.json();if(!r.ok){aErr('loginErr',d.error);return}boot(d)});
document.getElementById('regForm').addEventListener('submit',async e=>{e.preventDefault();const u=document.getElementById('regU').value.trim().toLowerCase(),p=document.getElementById('regP').value;if(u.length<3||p.length<6){aErr('regErr','3+ chars, 6+ pass');return}const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});const d=await r.json();if(!r.ok){aErr('regErr',d.error);return}boot(d)});

function boot(d){token=d.token;me=d.user;localStorage.setItem('nc_t',token);document.getElementById('authWrap').style.display='none';document.getElementById('app').style.display='block';if(me.role==='admin'||me.role==='superadmin')document.getElementById('adminBtn').style.display='inline-flex';connect();loadU();if(window.innerWidth<=768)document.getElementById('hamburger').style.display='inline-flex'}

function logout(){fetch('/api/logout',{headers:{'Authorization':'Bearer '+token}}).catch(()=>{});if(socket)socket.disconnect();localStorage.removeItem('nc_t');location.reload()}

function connect(){socket=io({auth:{token}});
socket.on('message:new',m=>{if(cc&&m.chatId===cc.id){aMsg(m)}loadU()});
socket.on('message:reacted',d=>{document.querySelectorAll(`.msg[data-id="${d.msgId}"] .reactions`).forEach(el=>el.innerHTML=rR(d.reactions))});
socket.on('message:edited',d=>{document.querySelectorAll(`.msg[data-id="${d.msgId}"] .txt`).forEach(el=>{el.innerHTML=esc(d.content)+' <i class="edited">(edited)</i>'})});
socket.on('message:deleted',d=>{if(d.forEveryone)document.querySelectorAll(`.msg[data-id="${d.msgId}"]`).forEach(el=>el.remove());else document.querySelectorAll(`.msg[data-id="${d.msgId}"] .txt`).forEach(el=>el.textContent='Deleted')});
socket.on('typing:update',d=>{if(cc&&d.chatId===cc.id)document.getElementById('typing').textContent=d.typing?`${d.user} typing...`:''});
socket.on('user:online',d=>{online.add(d.id);uStatus();loadU()});
socket.on('user:offline',d=>{online.delete(d.id);uStatus();loadU()});
socket.on('announcement',d=>{toast(`📢 ${d.text}`)});if(cc)socket.emit('chat:join',cc.id)}

async function loadU(){try{const r=await fetch('/api/users',{headers:{'Authorization':'Bearer '+token}});users=await r.json();renderU()}catch(e){}}

function renderU(){const el=document.getElementById('chatList');if(curTab==='groups'){el.innerHTML='<div style="padding:8px 12px"><button class="btn btn-pri btn-sm" onclick="cGroup()" style="width:100%"><i class="fas fa-plus"></i> Create Group</button></div>';return}
if(!users.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--tm);font-size:13px">No users</div>';return}
el.innerHTML=users.map(u=>{const i=(u.displayName||u.username)[0].toUpperCase(),on=online.has(u.id);return`<div class="chat-item ${cc&&cc.id===u.id?'active':''}" onclick="openC('${u.id}','${u.username}','${u.displayName||''}','${u.avatar||''}')"><div class="c-av">${u.avatar?'<img src="'+u.avatar+'">':i}<div class="online-dot ${on?'show':''}"></div></div><div class="c-info"><div class="c-name">${esc(u.displayName||u.username)}${u.verified?' <span class="v"><i class="fas fa-check-circle"></i></span>':''}${u.premium?' <span class="prem"><i class="fas fa-crown"></i></span>':''}</div><div class="c-last">${on?'Online':'Offline'}</div></div></div>`}).join('')}

function searchU(q){if(!q||q.length<2){renderU();return}
const f=users.filter(u=>u.username.includes(q.toLowerCase())||(u.displayName||'').toLowerCase().includes(q.toLowerCase()));const el=document.getElementById('chatList');if(!f.length){el.innerHTML='<div style="text-align:center;padding:30px;color:var(--tm);font-size:13px">No one found</div>';return}
el.innerHTML=f.map(u=>{const i=(u.displayName||u.username)[0].toUpperCase(),on=online.has(u.id);return`<div class="chat-item" onclick="openC('${u.id}','${u.username}','${u.displayName||''}','${u.avatar||''}')"><div class="c-av">${u.avatar?'<img src="'+u.avatar+'">':i}<div class="online-dot ${on?'show':''}"></div></div><div class="c-info"><div class="c-name">${esc(u.displayName||u.username)}</div></div></div>`}).join('')}

function sTab(t){curTab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.textContent.includes(t==='users'?'Chats':'Groups')));renderU();document.getElementById('search').value=''}

function openC(id,un,dn,av){var cid=[me.id,id].sort().join(':');cc={id:cid,username:un,displayName:dn||un,avatar:av,type:'private'};showChat(dn||un,av);if(socket)socket.emit('chat:join',cid);loadM(cid);renderU();if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open')}
function showChat(n,av){document.getElementById('empty').style.display='none';document.getElementById('msgs').style.display='flex';document.getElementById('chatTop').style.display='flex';document.getElementById('inputArea').style.display='flex';document.getElementById('chName').innerHTML=esc(n);document.getElementById('chAv').innerHTML=av?'<img src="'+av+'">':n[0].toUpperCase();document.getElementById('callBtn').style.display='inline-flex';uStatus()}
function uStatus(){if(!cc)return;document.getElementById('chStatus').textContent=online.has(cc.id)?'🟢 Online':'○ Offline'}
async function loadM(chatId){try{const r=await fetch('/api/messages/'+chatId,{headers:{'Authorization':'Bearer '+token}});const ms=await r.json();const el=document.getElementById('msgs');el.innerHTML=ms.map(m=>rM(m)).join('');el.scrollTop=el.scrollHeight}catch(e){}}

function rM(m){const mine=m.senderId===me.id,time=new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});let c=m.content;if(m.type==='image')c=`<img src="${c}" onclick="window.open(this.src)" loading="lazy">`;else if(m.type==='video')c=`<video src="${c}" controls style="max-width:200px;border-radius:6px"></video>`;else if(m.type==='audio')c=`<audio src="${c}" controls style="max-width:200px"></audio>`;else c=esc(c);if(m.deleted)c='<em>Deleted</em>'
const check=mine?` <i class="fas fa-check${m.readBy&&m.readBy.length>1?'-double':''}" style="font-size:9px"></i>`:'';
return `<div class="msg ${mine?'sent':'recv'}" data-id="${m.id}">${!mine?'<div class="sender">'+esc(m.senderDisplayName||m.senderUsername)+'</div>':''}<div class="txt">${c}${m.edited?' <i class="edited">(edited)</i>':''}</div><div class="reactions">${rR(m.reactions||[])}</div><div class="time">${time}${check}</div></div>`}
function rR(rs){if(!rs||!rs.length)return '';const cnt={};rs.forEach(r=>{cnt[r.emoji]=(cnt[r.emoji]||0)+1});let h='';for(const[e,c]of Object.entries(cnt))h+=`<span onclick="react('${e}')">${e} ${c}</span>`;return h}
function aMsg(m){const el=document.getElementById('msgs');el.insertAdjacentHTML('beforeend',rM(m));el.scrollTop=el.scrollHeight}
function send(){const inp=document.getElementById('msgIn'),txt=inp.value.trim();if(!txt||!cc||!socket)return;socket.emit('message:send',{chatId:cc.id,chatType:cc.type||'private',content:txt,type:'text'});inp.value=''}
function react(e){if(!socket)return;const last=document.querySelector('.msg:last-child');if(last)socket.emit('message:react',{msgId:last.dataset.id,emoji:e})}

function upFile(inp){const f=inp.files[0];if(!f||!cc)return;const fd=new FormData();fd.append('file',f);fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd}).then(r=>r.json()).then(d=>{const t=f.type.startsWith('image/')?'image':f.type.startsWith('video/')?'video':f.type.startsWith('audio/')?'audio':'file';socket.emit('message:send',{chatId:cc.id,chatType:cc.type||'private',content:d.url,type:t});inp.value=''}).catch(()=>toast('Upload failed'))}
function upAv(inp){const f=inp.files[0];if(!f)return;const fd=new FormData();fd.append('avatar',f);fetch('/api/profile',{method:'PUT',headers:{'Authorization':'Bearer '+token},body:fd}).catch(()=>{})}

function tSide(){document.getElementById('sidebar').classList.toggle('open')}
function tTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark')}
function openProf(){document.getElementById('profileModal').classList.add('open');document.getElementById('pName').value=me.displayName||'';document.getElementById('pBio').value=me.bio||'';document.getElementById('pVer').textContent=me.verified?'✅':'❌';document.getElementById('pPrem').textContent=me.premium?'✅':'❌'}
async function saveProf(){const r=await fetch('/api/profile',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({displayName:document.getElementById('pName').value.trim(),bio:document.getElementById('pBio').value.trim()})});const d=await r.json();if(d.success){me=d.user;toast('Saved!');cMod('profileModal')}else toast('Error')}
function callUser(){toast('📞 Calling... (UI only)')}

async function cGroup(){const n=prompt('Group name:');if(!n)return;const r=await fetch('/api/groups',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({name:n})});const d=await r.json();if(d.success){toast('Group created! Invite code: '+d.group.inviteCode);sTab('groups')}else toast('Error')}

function openAdmin(){const m=document.getElementById('adminModal');if(m.classList.contains('open')){cMod('adminModal');return}m.classList.add('open')
fetch('/admin/stats',{headers:{'Authorization':'Bearer '+token}}).then(r=>r.json()).then(d=>{document.getElementById('aUsers').textContent=d.totalUsers||0;document.getElementById('aMsgs').textContent=d.totalMessages||0;document.getElementById('aPrem').textContent=d.premium||0}).catch(()=>{});aFind()}
async function aFind(){const q=document.getElementById('aSearch').value.trim().toLowerCase();try{const r=await fetch('/admin/users',{headers:{'Authorization':'Bearer '+token}});const us=await r.json();const f=q?us.filter(u=>u.username.includes(q)):us.slice(0,30);document.getElementById('aList').innerHTML=f.map(u=>`<div style="background:var(--s);border-radius:8px;padding:8px 10px;margin-bottom:4px;display:flex;align-items:center;gap:6px;font-size:13px;flex-wrap:wrap"><span style="flex:1;min-width:60px"><strong>${esc(u.username)}</strong> ${u.verified?'✅':''}${u.premium?'💎':''} ${u.banned?'🚫':''}</span><button class="btn-sec btn-sm" onclick="aUp('${u.id}','verified',${!u.verified})">${u.verified?'Unv':'Ver'}</button><button class="btn-sec btn-sm" onclick="aUp('${u.id}','premium',${!u.premium})">${u.premium?'-P':'+P'}</button><button class="btn-sec btn-sm" onclick="aUp('${u.id}','banned',${!u.banned})">${u.banned?'Unban':'Ban'}</button></div>`).join('')}catch(e){}}
async function aUp(id,f,v){await fetch('/admin/user/'+id,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({[f]:v})});toast('Done');aFind()}

function cMod(id){document.getElementById(id).classList.remove('open')}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',2500)}

if(token&&me){document.getElementById('authWrap').style.display='none';document.getElementById('app').style.display='block';if(me.role==='admin'||me.role==='superadmin')document.getElementById('adminBtn').style.display='inline-flex';connect();loadU();if(window.innerWidth<=768)document.getElementById('hamburger').style.display='inline-flex'}
</script>
</body></html>
